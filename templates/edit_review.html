<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기록 수정하기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #F5F5F7; color: #1D1D1F; padding: 40px; margin: 0; transition: background-color 0.3s, color 0.3s; letter-spacing: -0.3px; }
        .container { max-width: 700px; margin: 0 auto; }
        
        .nav-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { padding: 12px 20px; background-color: transparent; color: #007AFF; text-decoration: none; border-radius: 12px; font-weight: 600; transition: 0.2s; }
        .back-btn:hover { background-color: rgba(0, 122, 255, 0.1); }
        .theme-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #C7C7CC; background: transparent; color: inherit; cursor: pointer; font-weight: 600; transition: 0.3s; }

        .edit-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .book-summary { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #E5E5EA; padding-bottom: 20px; }
        .book-summary img { width: 70px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .book-info-text .title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
        .book-info-text .author { font-size: 0.95rem; color: #86868B; }

        .section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: #1D1D1F; }
        
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 8px; margin-bottom: 25px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2.2rem; color: #E5E5EA; cursor: pointer; transition: color 0.2s; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: #FFCC00; }

        textarea { width: 100%; box-sizing: border-box; padding: 20px; border-radius: 14px; border: 1px solid transparent; background-color: #F5F5F7; font-family: inherit; font-size: 1.05rem; color: #1D1D1F; resize: vertical; margin-bottom: 25px; outline: none; transition: 0.3s; line-height: 1.6; }
        textarea:focus { background-color: #FFFFFF; border-color: #007AFF; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15); }
        
        .btn-group { display: flex; gap: 10px; }
        .submit-btn { padding: 14px 28px; background-color: #007AFF; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 1.05rem; transition: 0.2s; }
        .submit-btn:hover { background-color: #0062CC; }
        .cancel-btn { padding: 14px 24px; background-color: #E8E8ED; color: #1D1D1F; text-decoration: none; border-radius: 14px; font-weight: 600; font-size: 1.05rem; text-align: center; transition: 0.2s; }
        .cancel-btn:hover { background-color: #D1D1D6; }

        body.dark-mode { background-color: #000000; color: #F5F5F7; }
        body.dark-mode .edit-box { background-color: #1C1C1E; box-shadow: none; }
        body.dark-mode .book-summary { border-color: #38383A; }
        body.dark-mode .book-info-text .title { color: #FFFFFF; }
        body.dark-mode .book-info-text .author { color: #98989D; }
        body.dark-mode textarea { background-color: #2C2C2E; color: #FFFFFF; }
        body.dark-mode textarea:focus { background-color: #1C1C1E; border-color: #0A84FF; box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2); }
        body.dark-mode .submit-btn { background-color: #0A84FF; }
        body.dark-mode .cancel-btn { background-color: #2C2C2E; color: #FFFFFF; }
        body.dark-mode .cancel-btn:hover { background-color: #3A3A3C; }
        body.dark-mode .back-btn { color: #0A84FF; }
        body.dark-mode .theme-btn { border-color: #48484A; }
        body.dark-mode .star-rating label { color: #38383A; }
        body.dark-mode .star-rating input:checked ~ label, body.dark-mode .star-rating label:hover, body.dark-mode .star-rating label:hover ~ label { color: #FFD60A; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <a href="javascript:history.back()" class="back-btn">취소하고 돌아가기</a>
            <button id="theme-toggle" class="theme-btn">다크 모드</button>
        </div>

        <div class="edit-box">
            <div class="book-summary">
                <img src="{{ review['cover'] }}" alt="책 표지">
                <div class="book-info-text">
                    <div class="title">{{ review['title'] }}</div>
                    <div class="author">{{ review['author'] }}</div>
                </div>
            </div>

            <form action="/edit_review/{{ review['id'] }}" method="POST">
                <div class="section-title">별점 수정</div>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" {% if review['rating'] == 5 %}checked{% endif %}><label for="star5">★</label>
                    <input type="radio" id="star4" name="rating" value="4" {% if review['rating'] == 4 %}checked{% endif %}><label for="star4">★</label>
                    <input type="radio" id="star3" name="rating" value="3" {% if review['rating'] == 3 %}checked{% endif %}><label for="star3">★</label>
                    <input type="radio" id="star2" name="rating" value="2" {% if review['rating'] == 2 %}checked{% endif %}><label for="star2">★</label>
                    <input type="radio" id="star1" name="rating" value="1" {% if review['rating'] == 1 %}checked{% endif %}><label for="star1">★</label>
                </div>

                <div class="section-title">감상 기록 수정</div>
                <textarea name="review_text" rows="6" required>{{ review['review_text'] }}</textarea>
                
                <div class="btn-group">
                    <button type="submit" class="submit-btn">수정 완료</button>
                    <a href="/my_reviews" class="cancel-btn">취소</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('theme-toggle');
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if(toggleBtn) toggleBtn.textContent = '라이트 모드';
            }
            if(toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('dark-mode');
                    let theme = 'light';
                    if (document.body.classList.contains('dark-mode')) {
                        theme = 'dark';
                        toggleBtn.textContent = '라이트 모드';
                    } else {
                        toggleBtn.textContent = '다크 모드';
                    }
                    localStorage.setItem('theme', theme); 
                });
            }
        });
    </script>
</body>
</html>
