{% extends "base.html" %}

{% block title %}회원가입 - Book Archive{% endblock %}

{% block extra_css %}
<style>
    .auth-container { max-width: 420px; margin: 60px auto; background: var(--bg-card); padding: 40px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
    .auth-title { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
    
    .input-group { margin-bottom: 22px; position: relative; }
    .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); font-size: 0.95rem; }
    .input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
    .auth-input { width: 100%; padding: 14px 50px 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; font-family: inherit; box-sizing: border-box; }
    .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }
    
    .password-toggle { position: absolute; right: 16px; background: none; border: none; color: var(--text-sub); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; height: 100%; outline: none; user-select: none; transition: color 0.2s; }
    .password-toggle:hover { color: var(--text-main); }

    .auth-btn { width: 100%; padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; margin-top: 10px; }
    .auth-btn:hover { background-color: var(--accent-hover); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.2); }
    
    .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: var(--text-sub); font-size: 0.85rem; font-weight: 600; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
    .divider::before { margin-right: 1em; } .divider::after { margin-left: 1em; }

    .naver-btn { width: 100%; padding: 16px; background-color: #03C75A; color: #FFFFFF; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-sizing: border-box; margin-bottom: 20px; }
    .naver-btn:hover { background-color: #02b350; }

    .auth-switch { text-align: center; font-size: 0.95rem; color: var(--text-sub); font-weight: 500; }
    .auth-switch a { color: var(--accent); text-decoration: none; font-weight: 700; margin-left: 5px; }
    .auth-switch a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-title">회원가입</div>
    <form method="POST" action="/signup">
        <div class="input-group">
            <label for="username">아이디</label>
            <div class="input-wrapper">
                <input type="text" id="username" name="username" class="auth-input" style="padding-right: 16px;" placeholder="새로운 아이디를 생성하세요" required>
            </div>
        </div>
        
        <div class="input-group">
            <label for="password">비밀번호</label>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" class="auth-input" placeholder="비밀번호를 입력하세요 (4자리 이상)" minlength="4" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
        
        <button type="submit" class="auth-btn">가입하기</button>
    </form>
    
    <div class="divider">또는</div>
    
    <a href="/login/naver" class="naver-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.0703 24L7.54688 12.5156V24H0V0H7.92188L16.4531 11.4844V0H24V24H16.0703Z" fill="white"/>
        </svg>
        네이버 1초 회원가입
    </a>

    <div class="auth-switch">
        이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

    function togglePasswordVisibility(inputId, button) {
        const passwordInput = document.getElementById(inputId);
        if (!passwordInput) return;
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text'; button.innerHTML = eyeOffIcon;
        } else {
            passwordInput.type = 'password'; button.innerHTML = eyeIcon;
        }
    }
</script>
{% endblock %}
